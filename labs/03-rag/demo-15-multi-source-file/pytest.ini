[pytest]
# Pytest configuration for practice-multi-source tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --log-level=INFO

# Test paths
testpaths = test

# Logging configuration
log_cli = false
log_cli_level = INFO
log_file_level = INFO

# Markers
markers =
    integration: Integration tests that test complete workflows
    unit: Unit tests for individual functions
    error: Tests for error handling scenarios
